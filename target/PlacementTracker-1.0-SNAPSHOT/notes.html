<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PlacePrep — Notes</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="dashboard.html">
    <div class="logo-icon">🎯</div>
    <span class="brand-text">Place<span>Prep</span></span>
  </a>
  <div class="nav-links">
    <a href="dashboard.html">⬛ Dashboard</a>
    <a href="problems.html">💻 Problems</a>
    <a href="notes.html" class="active">📝 Notes</a>
    <a href="progress.html">📊 Progress</a>
  </div>
  <div class="nav-user">
    <div class="user-chip">
      <div class="user-avatar" id="nav-avatar">U</div>
      <span id="nav-user-name">Loading…</span>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page-container">

  <div class="page-header">
    <div class="breadcrumb"><span>~/</span>notes</div>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
      <div>
        <h1>My Notes 📝</h1>
        <p>Capture key concepts, approaches, and interview tips.</p>
      </div>
      <button class="btn btn-primary" onclick="openAddNoteModal()">+ New Note</button>
    </div>
  </div>

  <!-- Search -->
  <div class="filter-bar" style="margin-bottom:1.5rem;">
    <div class="search-input-wrap" style="max-width:400px;">
      <span class="search-icon">🔍</span>
      <input type="text" id="note-search" class="form-control"
             placeholder="Search notes…" oninput="debouncedLoadNotes()"/>
    </div>
    <span id="notes-count" class="badge" style="background:var(--accent-dim);color:var(--accent);"></span>
  </div>

  <!-- Notes Grid -->
  <div class="notes-grid" id="notes-grid">
    <div style="text-align:center;padding:3rem;grid-column:1/-1;">
      <div class="spinner"></div>
    </div>
  </div>

</div>

<!-- ── Add / Edit Note Modal ──────────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="note-modal">
  <div class="modal" style="max-width:640px;">
    <div class="modal-header">
      <h3 class="modal-title" id="note-modal-title">New Note</h3>
      <button class="modal-close" onclick="closeModal('note-modal')">✕</button>
    </div>
    <form id="note-form" onsubmit="submitNote(event)">
      <input type="hidden" id="note-edit-id" value=""/>
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" id="note-title" class="form-control"
               placeholder="e.g. Dynamic Programming Tips" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Content</label>
        <textarea id="note-content" class="form-control" rows="10"
                  placeholder="Write your notes here…&#10;&#10;Tip: Use plain text or pseudo-code."></textarea>
      </div>
      <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
        <button type="button" class="btn btn-secondary" onclick="closeModal('note-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary" id="note-submit-btn">Save Note</button>
      </div>
    </form>
  </div>
</div>

<!-- ── View Note Modal ────────────────────────────────────────────────────── -->
<div class="modal-overlay hidden" id="view-note-modal">
  <div class="modal" style="max-width:640px;">
    <div class="modal-header">
      <h3 class="modal-title" id="view-note-title">Note Title</h3>
      <button class="modal-close" onclick="closeModal('view-note-modal')">✕</button>
    </div>
    <div id="view-note-content"
         style="white-space:pre-wrap;font-family:var(--font-mono);font-size:0.875rem;
                color:var(--text-secondary);line-height:1.7;max-height:60vh;overflow-y:auto;"></div>
    <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);">
      <span id="view-note-date" class="muted mono" style="font-size:0.75rem;flex:1;align-self:center;"></span>
      <button class="btn btn-secondary" id="view-edit-btn">✏️ Edit</button>
      <button class="btn btn-danger" id="view-delete-btn">🗑️ Delete</button>
    </div>
  </div>
</div>

<nav class="mobile-nav">
  <a href="dashboard.html"><span class="nav-icon">⬛</span>Home</a>
  <a href="problems.html"><span class="nav-icon">💻</span>Problems</a>
  <a href="notes.html" class="active"><span class="nav-icon">📝</span>Notes</a>
  <a href="progress.html"><span class="nav-icon">📊</span>Progress</a>
</nav>

<div id="toast-container" class="toast-container"></div>

<script src="js/app.js"></script>
<script src="js/notes.js"></script>
</body>
</html>
