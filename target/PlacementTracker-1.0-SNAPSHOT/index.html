<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LeetMe — Login</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* Animated background orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width:400px;height:400px;background:rgba(0,212,255,0.07);top:-100px;left:-100px; }
    .orb-2 { width:350px;height:350px;background:rgba(168,85,247,0.07);bottom:-80px;right:-80px;animation-delay:-5s; }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px,30px) scale(1.08); }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-page" style="position:relative;z-index:1;">
    <div class="auth-container">

      <!-- Logo / Branding -->
      <div class="auth-logo">
        <div class="logo-big"></div>
        <h1>Leet<span>Me</span></h1>
        <p>Your placement preparation companion</p>
      </div>

      <!-- Auth Card -->
      <div class="auth-card">

        <!-- Tab Switcher -->
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login')">Login</button>
          <button class="auth-tab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Error Message (shown from server redirect) -->
        <div id="error-box" class="error-msg hidden">
          <span>⚠</span>
          <span id="error-text"></span>
        </div>

        <!-- ── Login Form ─────────────────────────────── -->
        <form id="login-form" class="auth-form active" action="auth" method="POST">
          <input type="hidden" name="action" value="login"/>

          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control"
                   placeholder="you@example.com" required autocomplete="email"/>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control"
                   placeholder="Enter your password" required autocomplete="current-password"/>
          </div>

          <button type="submit" class="btn btn-primary w-full btn-lg" style="margin-top:0.5rem;">
            Login
          </button>
        </form>

        <!-- ── Register Form ──────────────────────────── -->
        <form id="register-form" class="auth-form" action="auth" method="POST">
          <input type="hidden" name="action" value="register"/>

          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control"
                   placeholder="Johan" required autocomplete="name"/>
          </div>

          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control"
                   placeholder="johan@example.com" required autocomplete="email"/>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control"
                     placeholder="Min 6 characters" required autocomplete="new-password"/>
            </div>
            <div class="form-group">
              <label class="form-label">Confirm Password</label>
              <input type="password" name="confirmPassword" class="form-control"
                     placeholder="Repeat password" required/>
                     
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-full btn-lg" style="margin-top:0.5rem;">
             Create Account
          </button>
        </form>

      </div><!-- /auth-card -->

      <div class="auth-footer">
        &copy; 2024 PlacePrep &bull; Track. Learn. Succeed.
      </div>

    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // ── Tab switching ─────────────────────────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
      });
      document.getElementById('login-form').classList.toggle('active', tab === 'login');
      document.getElementById('register-form').classList.toggle('active', tab === 'register');
    }

    // ── Show server-side error from session ───────────────────────────────
    (async function checkError() {
      // We use a small trick: ping /session and check for any error
      // (Errors are set via session attribute in AuthServlet)
      try {
        const res = await fetch('auth-error');
        if (res.ok) {
          const data = await res.json();
          if (data.error) showErrorBox(data.error);
        }
      } catch(_) {}

      // Fallback: check URL param (set by some redirect flows)
      const params = new URLSearchParams(window.location.search);
      if (params.get('error')) showErrorBox(decodeURIComponent(params.get('error')));
    })();

    function showErrorBox(msg) {
      const box  = document.getElementById('error-box');
      const text = document.getElementById('error-text');
      box.classList.remove('hidden');
      text.textContent = msg;
    }

    // ── If already logged in, redirect to dashboard ───────────────────────
    (async function checkSession() {
      try {
        const res = await fetch('session');
        const data = await res.json();
        if (data.loggedIn) window.location.href = 'dashboard.html';
      } catch(_) {}
    })();

    // ── Client-side password match validation ─────────────────────────────
    document.getElementById('register-form').addEventListener('submit', function(e) {
      const pw  = this.querySelector('[name="password"]').value;
      const cpw = this.querySelector('[name="confirmPassword"]').value;
      if (pw !== cpw) {
        e.preventDefault();
        showErrorBox('Passwords do not match.');
      }
    });
  </script>
</body>
</html>
